  <style>
    * {
      font-family: 'Outfit', sans-serif;
    }

    @keyframes slideUp {
      from {
        transform: translateY(16px);
        opacity: 0
      }

      to {
        transform: translateY(0);
        opacity: 1
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes pulse-dot {

      0%,
      100% {
        transform: scale(1)
      }

      50% {
        transform: scale(1.4)
      }
    }

    .slide-up {
      animation: slideUp .3s ease forwards
    }

    .input-field {
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1.5px solid #E2E8F0;
      font-size: 14px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      background: #fff;
    }

    .input-field:focus {
      border-color: #0EA5E9;
      box-shadow: 0 0 0 3px rgba(14, 165, 233, .15)
    }

    .live-dot {
      animation: pulse-dot 1.4s ease-in-out infinite
    }

    @keyframes snow-a {

      0%,
      100% {
        transform: translateY(0) rotate(0deg)
      }

      40% {
        transform: translateY(-18px) rotate(50deg)
      }

      75% {
        transform: translateY(9px) rotate(95deg)
      }
    }

    @keyframes snow-b {

      0%,
      100% {
        transform: translateY(0) rotate(20deg)
      }

      50% {
        transform: translateY(-12px) rotate(-30deg)
      }
    }

    @keyframes snow-c {

      0%,
      100% {
        transform: translateY(0) rotate(-10deg)
      }

      60% {
        transform: translateY(-22px) rotate(60deg)
      }
    }

    @keyframes snow-d {

      0%,
      100% {
        transform: translateY(0) rotate(0deg)
      }

      45% {
        transform: translateY(-8px) rotate(-45deg)
      }
    }

    @keyframes snow-e {

      0%,
      100% {
        transform: translateY(0) rotate(15deg)
      }

      55% {
        transform: translateY(-14px) rotate(-20deg)
      }
    }

    .sf-a {
      animation: snow-a 7s ease-in-out infinite
    }

    .sf-b {
      animation: snow-b 5s ease-in-out infinite
    }

    .sf-c {
      animation: snow-c 9s ease-in-out infinite
    }

    .sf-d {
      animation: snow-d 4.5s ease-in-out infinite
    }

    .sf-e {
      animation: snow-e 6.5s ease-in-out infinite

    #auth-login-btn:hover {
      background: #1e3a5f !important
    }

    #auth-reg-btn:hover {
      background: #1e3a5f !important
    }

      appId: "1:646060870448:web:6fef44eb55815315dc56f5",

    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    /* ── Toast ── */
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      const colors = { success: '#10B981', error: '#EF4444', info: '#0EA5E9', warn: '#F59E0B' };
      t.style.background = colors[type] || colors.info;
      t.textContent = msg;
      t.classList.remove('hidden');
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.classList.add('hidden'), 3200);
    }

    function showLoading(msg) {
      const el = document.getElementById('loading-overlay');
      el.classList.replace('hidden', 'flex');
      const p = el.querySelector('p');
      if (p && msg) p.textContent = msg;
    }
    function hideLoading() {
      document.getElementById('loading-overlay').classList.replace('flex', 'hidden');
    }

    /* ── Toggle password visibility ── */
    function togglePwd(inputId, eyeId) {
      const inp = document.getElementById(inputId);
      const eye = document.getElementById(eyeId);
      if (!inp) return;
      inp.type = inp.type === 'password' ? 'text' : 'password';
      if (eye) eye.textContent = inp.type === 'password' ? '👁' : '🙈';
    }

    /* ── Auth tab switch ── */
    function switchAuthTab(tab) {
      document.getElementById('form-login').classList.toggle('hidden', tab !== 'login');
      document.getElementById('form-register').classList.toggle('hidden', tab !== 'register');
      const loginBtn = document.getElementById('atab-login');
      const regBtn = document.getElementById('atab-register');
      const activeStyle = "flex:1;padding:10px 0;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;background:#0F172A;color:#fff;transition:all 0.2s;box-shadow:0 2px 8px rgba(0,0,0,0.15)";
      const inactiveStyle = "flex:1;padding:10px 0;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;background:transparent;color:#64748B;transition:all 0.2s";
      loginBtn.style.cssText = tab === 'login' ? activeStyle : inactiveStyle;
      regBtn.style.cssText = tab === 'register' ? activeStyle : inactiveStyle;
    }

    /* ── Auth helpers: phone ↔ email ── */
    function phoneToEmail(raw) {
      let p = raw.replace(/[\s\-\(\)\.]/g, '');
      if (p.startsWith('+84')) p = '0' + p.slice(3);
      if (p.startsWith('84') && p.length === 11) p = '0' + p.slice(2);
      if (/^0\d{9}$/.test(p)) return p + '@dienlanhpro.com';
      return null;
    }

    function isPhoneInput(val) {
      const clean = val.replace(/[\s\-\(\)\.]/g, '');
      return /^(\+84|84|0)\d{8,10}$/.test(clean);
    }

    function resolveIdentifier(ident) {
      ident = ident.trim();
      if (isPhoneInput(ident)) {
        const email = phoneToEmail(ident);
        if (!email) return null;
        return email;
      }
      return ident.toLowerCase();
    }

    /* ── Login ── */
    async function loginUser() {
      const ident = document.getElementById('l-ident').value.trim();
      const pass = document.getElementById('l-pass').value;
      if (!ident || !pass) return showToast('Nhập số điện thoại / email và mật khẩu', 'error');
      const email = resolveIdentifier(ident);
      if (!email) return showToast('Số điện thoại không hợp lệ', 'error');
      showLoading('Đang đăng nhập...');
      try {
        await auth.signInWithEmailAndPassword(email, pass);
      } catch (e) {
        hideLoading();
        const code = e.code || '';
        if (code.includes('user-not-found') || code.includes('credential') || code.includes('password') || code.includes('invalid-credential')) {
          showToast('Số điện thoại / mật khẩu không đúng', 'error');
        } else {
          showToast(authError(e.code), 'error');
        }
      }
    }

    /* ── Register ── */
    async function registerUser() {
      const name = document.getElementById('r-name').value.trim();
      const phone = document.getElementById('r-phone').value.trim();
      const pass = document.getElementById('r-pass').value;
      const pass2 = document.getElementById('r-pass2').value;

      if (!name) return showToast('Nhập họ và tên', 'error');
      if (!phone) return showToast('Nhập số điện thoại', 'error');
      const email = phoneToEmail(phone);
      if (!email) return showToast('Số điện thoại không hợp lệ (VD: 0901234567)', 'error');
      if (!pass) return showToast('Nhập mật khẩu', 'error');
      if (pass !== pass2) return showToast('Mật khẩu xác nhận không khớp', 'error');
      if (pass.length < 6) return showToast('Mật khẩu tối thiểu 6 ký tự', 'error');

      showLoading('Đang tạo tài khoản...');
      try {
        const cred = await auth.createUserWithEmailAndPassword(email, pass);
        await cred.user.updateProfile({ displayName: name });
        await db.collection('users').doc(cred.user.uid).set({
          name, phone, email, role: 'user',
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        // Upsert customer record
        const snap = await db.collection('customers').where('phone', '==', phone).limit(1).get();
        if (snap.empty) {
          await db.collection('customers').add({
            phone, name, orderCount: 0, totalSpend: 0,
            lastService: '', lastDate: '', category: 'new',
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
        }
        // onAuthStateChanged will redirect to home.html
      } catch (err) {
        hideLoading();
        if (err.code === 'auth/email-already-in-use') {
          showToast('Số điện thoại này đã được đăng ký', 'error');
        } else {
          showToast('Lỗi: ' + err.message, 'error');
        }
      }
    }

    /* ── Auth error messages ── */
    function authError(code) {
      const map = {
        'auth/user-not-found': 'Email / SĐT không tồn tại',
        'auth/wrong-password': 'Sai mật khẩu',
        'auth/invalid-credential': 'SĐT / email hoặc mật khẩu không đúng',
        'auth/email-already-in-use': 'Số điện thoại đã được đăng ký',
        'auth/invalid-email': 'Email không hợp lệ',
        'auth/too-many-requests': 'Quá nhiều lần thử, vui lòng đợi',
        'auth/network-request-failed': 'Lỗi kết nối mạng',
      };
      return map[code] || `Lỗi (${code})`;
    }

    /* ── Auth state: đã đăng nhập → vào home.html ── */
    auth.onAuthStateChanged(user => {
      if (user) {
        window.location.href = 'home.html';
      } else {
        hideLoading();
      }
    });
  </script>
</body>
